<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사목 - MY Games</title>
    <meta name="description" content="사목(Connect Four) - 7열 6행 보드에서 4개를 먼저 연속으로 놓으면 승리하는 전략 게임. AI 대전과 2인 대전 지원.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .c4-board-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }
        .c4-col-hints {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            width: min(490px, 94vw);
        }
        .c4-col-hint {
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
            background: transparent;
        }
        .c4-col-hint:hover { background: rgba(255,255,255,0.15); }
        .c4-col-hint.hint-red:hover  { background: rgba(239,68,68,0.35); }
        .c4-col-hint.hint-yellow:hover { background: rgba(234,179,8,0.35); }
        .c4-board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: #1e3a5f;
            border-radius: 1rem;
            padding: 10px;
            width: min(490px, 94vw);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .c4-cell {
            aspect-ratio: 1;
            border-radius: 50%;
            background: #0f172a;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
            overflow: hidden;
        }
        .c4-cell.red    { background: #ef4444; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3), 0 0 8px rgba(239,68,68,0.5); }
        .c4-cell.yellow { background: #eab308; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3), 0 0 8px rgba(234,179,8,0.5); }
        .c4-cell.winning { animation: c4win 0.6s ease-in-out infinite alternate; }
        @keyframes c4win { from { filter: brightness(1); } to { filter: brightness(1.6); } }
        @keyframes dropIn {
            from { transform: translateY(-400%); opacity: 0.6; }
            to   { transform: translateY(0);     opacity: 1; }
        }
        .c4-cell.drop { animation: dropIn 0.28s cubic-bezier(0.4,0,0.2,1); }
        .c4-controls { display: flex; gap: 1rem; }
        .c4-difficulty { display: flex; gap: 0.5rem; align-items: center; font-size: 0.85rem; color: var(--text-muted); }
        .c4-diff-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            padding: 0.25rem 0.65rem;
            border-radius: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .c4-diff-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="game-nav">
            <a href="index.html" class="game-nav-item">오목</a>
            <a href="connect4.html" class="game-nav-item active">사목</a>
            <a href="chess.html" class="game-nav-item">체스</a>
            <a href="alkkagi.html" class="game-nav-item">알까기</a>
        </nav>

        <header>
            <h1>사목</h1>
            <p class="subtitle">Connect Four - 4개를 먼저 연결하세요</p>
        </header>

        <main>
            <div class="game-info">
                <div class="player black active" id="c4-player-red">
                    <div class="stone-preview" style="background:#ef4444;border-radius:50%;width:20px;height:20px;"></div>
                    <span class="player-name" id="c4-red-label">빨강 (Red)</span>
                </div>
                <div class="status-center">
                    <div class="status-message" id="c4-status">빨강의 차례입니다</div>
                </div>
                <div class="player white" id="c4-player-yellow">
                    <div class="stone-preview" style="background:#eab308;border-radius:50%;width:20px;height:20px;"></div>
                    <span class="player-name" id="c4-yellow-label">노랑 (Yellow)</span>
                </div>
            </div>

            <div class="c4-board-wrap">
                <div class="c4-col-hints" id="c4-hints"></div>
                <div class="c4-board" id="c4-board"></div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;margin-top:0.5rem;">
                <div class="c4-difficulty">
                    <span>난이도:</span>
                    <button class="c4-diff-btn" data-diff="easy">쉬움</button>
                    <button class="c4-diff-btn active" data-diff="normal">보통</button>
                    <button class="c4-diff-btn" data-diff="hard">어려움</button>
                </div>
                <div class="c4-controls">
                    <button class="btn primary" id="c4-pvp-btn">👤👤 1:1 하기</button>
                    <button class="btn secondary" id="c4-ai-btn">🤖 AI 대전</button>
                </div>
            </div>
        </main>

        <footer>
            <nav class="footer-nav">
                <a href="about.html">게임 소개</a>
                <span class="footer-sep">·</span>
                <a href="privacy.html">개인정보처리방침</a>
            </nav>
            <p class="footer-copy">&copy; 2025 MY Omok. All rights reserved.</p>
        </footer>
    </div>

    <div id="c4-win-overlay" class="overlay hidden">
        <div class="modal">
            <h2 id="c4-win-title">승리!</h2>
            <p id="c4-win-desc"></p>
            <button class="btn primary large" id="c4-modal-reset">다시 하기</button>
        </div>
    </div>

    <script src="connect4.js"></script>
</body>
</html>
