<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체스 - MY Games</title>
    <meta name="description" content="체스 - 클래식 전략 보드 게임. AI 대전과 2인 대전을 지원합니다. 설치 없이 브라우저에서 바로 플레이하세요.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- chess.js for move validation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        .chess-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .chess-labels-top, .chess-labels-bottom {
            display: grid;
            grid-template-columns: 28px repeat(8, 1fr) 28px;
            width: min(480px, 94vw);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }
        .chess-row-wrap {
            display: grid;
            grid-template-columns: 28px 1fr 28px;
            width: min(480px, 94vw);
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }
        .chess-sq {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.4rem, 4.5vw, 2.2rem);
            cursor: pointer;
            position: relative;
            transition: filter 0.1s;
            user-select: none;
        }
        .chess-sq.light { background: #f0d9b5; }
        .chess-sq.dark  { background: #b58863; }
        .chess-sq.selected { background: #f6f669 !important; }
        .chess-sq.legal-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
        }
        .chess-sq.legal-capture::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 0;
            border: 4px solid rgba(0,0,0,0.2);
            background: transparent;
        }
        .chess-sq.last-move { background: rgba(155,199,0,0.4) !important; }
        .chess-sq.in-check  { background: rgba(220,50,50,0.7) !important; }
        .chess-piece { line-height: 1; pointer-events: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
        .chess-piece.black-piece { filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)) brightness(0.15); }
        .chess-controls-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; justify-content: center; }
        .c4-difficulty { display: flex; gap: 0.5rem; align-items: center; font-size: 0.85rem; color: var(--text-muted); }
        .c4-diff-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            padding: 0.25rem 0.65rem;
            border-radius: 0.4rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .c4-diff-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .chess-captured { display: flex; gap: 0.25rem; font-size: 1rem; min-height: 1.5rem; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="game-nav">
            <a href="index.html" class="game-nav-item">오목</a>
            <a href="connect4.html" class="game-nav-item">사목</a>
            <a href="chess.html" class="game-nav-item active">체스</a>
            <a href="alkkagi.html" class="game-nav-item">알까기</a>
        </nav>

        <header>
            <h1>체스</h1>
            <p class="subtitle">Chess - 클래식 전략 보드 게임</p>
        </header>

        <main>
            <div class="game-info">
                <div class="player black active" id="chess-player-white">
                    <div class="stone-preview" style="background:#f0d9b5;border-radius:4px;width:20px;height:20px;border:1px solid rgba(255,255,255,0.3);"></div>
                    <span class="player-name" id="chess-white-label">흰색 (White)</span>
                </div>
                <div class="status-center">
                    <div class="status-message" id="chess-status">흰색의 차례입니다</div>
                </div>
                <div class="player white" id="chess-player-black">
                    <div class="stone-preview" style="background:#1e1e1e;border-radius:4px;width:20px;height:20px;border:1px solid rgba(255,255,255,0.3);"></div>
                    <span class="player-name" id="chess-black-label">검정 (Black)</span>
                </div>
            </div>

            <div class="chess-wrap">
                <div class="chess-captured" id="chess-cap-black"></div>
                <div class="chess-labels-top">
                    <span></span>
                    <span>a</span><span>b</span><span>c</span><span>d</span>
                    <span>e</span><span>f</span><span>g</span><span>h</span>
                    <span></span>
                </div>
                <div id="chess-board-rows"></div>
                <div class="chess-labels-bottom">
                    <span></span>
                    <span>a</span><span>b</span><span>c</span><span>d</span>
                    <span>e</span><span>f</span><span>g</span><span>h</span>
                    <span></span>
                </div>
                <div class="chess-captured" id="chess-cap-white"></div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;margin-top:0.5rem;">
                <div class="c4-difficulty">
                    <span>난이도:</span>
                    <button class="c4-diff-btn" data-diff="easy">쉬움</button>
                    <button class="c4-diff-btn active" data-diff="normal">보통</button>
                    <button class="c4-diff-btn" data-diff="hard">어려움</button>
                </div>
                <div class="chess-controls-row">
                    <button class="btn primary" id="chess-pvp-btn">👤👤 1:1 하기</button>
                    <button class="btn secondary" id="chess-ai-btn">🤖 AI 대전</button>
                    <button class="btn secondary" id="chess-reset-btn">재시작</button>
                </div>
            </div>
        </main>

        <footer>
            <nav class="footer-nav">
                <a href="about.html">게임 소개</a>
                <span class="footer-sep">·</span>
                <a href="privacy.html">개인정보처리방침</a>
            </nav>
            <p class="footer-copy">&copy; 2025 MY Omok. All rights reserved.</p>
        </footer>
    </div>

    <div id="chess-win-overlay" class="overlay hidden">
        <div class="modal">
            <h2 id="chess-win-title">승리!</h2>
            <p id="chess-win-desc"></p>
            <button class="btn primary large" id="chess-modal-reset">다시 하기</button>
        </div>
    </div>

    <script src="chess.js"></script>
</body>
</html>
