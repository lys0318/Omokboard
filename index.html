    <style>
        .hub-container {
            width: 100%;
            max-width: 820px;
            padding: 2.5rem 1.5rem 3rem;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }
        .hub-header { text-align: center; animation: fadeInDown 0.8s ease-out; }
        .hub-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hub-header p { color: var(--text-muted); font-size: 1.05rem; margin-top: 0.4rem; }

        .game-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
            width: 100%;
        }
        .game-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.25rem;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: all 0.25s;
            animation: fadeIn 0.8s ease-out;
        }
        .game-card:hover {
            background: rgba(59,130,246,0.1);
            border-color: rgba(59,130,246,0.4);
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(59,130,246,0.2);
        }
        .game-card-visual {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 0.75rem;
            overflow: hidden;
            position: relative;
        }
        /* 오목 미니 보드 */
        .mini-omok {
            background: linear-gradient(135deg, #deae6c, #b4854b);
            display: grid;
            place-items: center;
            font-size: 2rem;
            width: 100%;
            height: 100%;
        }
        .mini-omok-grid {
            display: grid;
            grid-template-columns: repeat(5,1fr);
            gap: 4px;
            padding: 8px;
        }
        .mini-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(90,60,30,0.25);
            position: relative;
        }
        .mini-dot.b { background: radial-gradient(circle at 35% 35%,#555,#111); }
        .mini-dot.w { background: radial-gradient(circle at 35% 35%,#fff,#d4d4d4); }
        /* 사목 미니 */
        .mini-c4 {
            background: linear-gradient(135deg,#1e3a5f,#0f2040);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
            gap: 5px;
            width: 100%;
            height: 100%;
        }
        .mini-c4-row { display: flex; gap: 5px; justify-content: center; }
        .mini-c4-hole {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
        }
        .mini-c4-hole.r { background: radial-gradient(circle at 35% 35%,#ff7070,#b91c1c); }
        .mini-c4-hole.y { background: radial-gradient(circle at 35% 35%,#ffe060,#ca8a04); }
        /* 체스 미니 */
        .mini-chess {
            display: grid;
            grid-template-columns: repeat(5,1fr);
            grid-template-rows: repeat(4,1fr);
            width: 100%;
            height: 100%;
        }
        .mini-chess-sq { display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .mini-chess-sq.light { background: #f0d9b5; }
        .mini-chess-sq.dark  { background: #b58863; }
        /* 알까기 미니 */
        .mini-alkkagi {
            background: linear-gradient(135deg,#c8883a,#a86f2e);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 20px;
            width: 100%;
            height: 100%;
        }
        .mini-marble-group { display: flex; flex-direction: column; gap: 6px; }
        .mini-marble {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }
        .mini-marble.r { background: radial-gradient(circle at 35% 35%,#ff7070,#b91c1c); }
        .mini-marble.b2 { background: radial-gradient(circle at 35% 35%,#70b0ff,#1d4ed8); }

        .game-card-info { text-align: center; }
        .game-card-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.3rem;
        }
        .game-card-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
        .play-badge {
            display: inline-block;
            background: var(--accent-blue);
            color: #fff;
            padding: 0.4rem 1.4rem;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 600;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        .game-card:hover .play-badge { background: var(--accent-blue-hover); }

        @media (max-width: 500px) {
            .game-cards { grid-template-columns: 1fr; }
            .hub-header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
